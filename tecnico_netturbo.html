<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <title>Minhas Atividades · Netturbo</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --accent:#5aa9e6;--accent-dark:#2f6fa8;--accent-dim:rgba(90,169,230,.08);
      --bg:#080808;--surface:#111;--surface2:#181818;--surface3:#212121;
      --border:#252525;--border-hi:#353535;
      --text:#e8e8e8;--text-dim:#888;--text-muted:#505050;
      --red:#e53935;--amber:#ffa000;--green:#8bc34a;
      --radius:6px;--radius-lg:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:15px}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:2rem}

    #login-overlay{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 50% 30%,#061626,#080808);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
    .login-box{width:100%;max-width:360px;background:linear-gradient(160deg,#111a22,#0f0f0f);border:1px solid #12283a;border-radius:20px;padding:2.2rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.1rem}
    .login-heading h2{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);text-align:center}
    .login-heading p{font-size:.63rem;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:.3rem;text-align:center}
    .login-field{width:100%;display:flex;flex-direction:column;gap:.3rem}
    .login-field label{font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim)}
    .login-field select,.login-field input{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:var(--text);font-size:.92rem;padding:.7rem .9rem;width:100%}
    .login-field select:focus,.login-field input:focus{outline:none;border-color:var(--accent)}
    .login-btn{width:100%;padding:.8rem;background:linear-gradient(135deg,#2f6fa8,#5aa9e6);border:none;border-radius:8px;color:#050505;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;margin-top:.3rem}
    .login-error{font-size:.75rem;color:var(--red);background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.3);border-radius:6px;padding:.5rem .75rem;width:100%;text-align:center;display:none}
    .login-error.visible{display:block}
    .login-info{font-size:.7rem;color:var(--text-dim);background:rgba(90,169,230,.08);border:1px solid rgba(90,169,230,.2);border-radius:6px;padding:.5rem .75rem;width:100%;text-align:center;display:none}
    .login-info.visible{display:block}
    .link-esqueci{font-size:.72rem;color:var(--accent);cursor:pointer;text-align:center;text-decoration:underline;margin-top:-.4rem}

    header{background:linear-gradient(180deg,#0a141c,#0f0f0f);border-bottom:1px solid #12283a;position:sticky;top:0;z-index:100}
    .header-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:.9rem;padding:.8rem 1rem}
    .hdr-brand{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:.1em;color:var(--accent);text-transform:uppercase}
    .hdr-sub{font-size:.6rem;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase}

    main{max-width:700px;margin:0 auto;padding:1.2rem 1rem 0}

    .atv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.1rem;margin-bottom:.9rem}
    .atv-protocolo{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--accent);font-size:1rem}
    .atv-cliente{font-size:.88rem;margin-top:.2rem}
    .atv-meta{font-size:.75rem;color:var(--text-muted);margin-top:.4rem;line-height:1.6}
    .atv-status{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:20px;margin-top:.5rem}
    .st-despachada{background:rgba(90,169,230,.1);color:var(--accent);border:1px solid rgba(90,169,230,.3)}
    .st-iniciada{background:rgba(255,160,0,.1);color:var(--amber);border:1px solid rgba(255,160,0,.3)}
    .st-em-campo{background:rgba(139,195,74,.1);color:var(--green);border:1px solid rgba(139,195,74,.3)}

    .btn-acao{width:100%;margin-top:.8rem;padding:.85rem;border:none;border-radius:var(--radius-lg);font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:.95rem;cursor:pointer}
    .btn-iniciar{background:linear-gradient(135deg,#8a6010,#d4a843);color:#050505}
    .btn-chegada{background:linear-gradient(135deg,#5d8a1f,#8bc34a);color:#050505}
    .btn-concluido{background:var(--surface3);color:var(--text-dim);cursor:default}
    .btn-validar{background:linear-gradient(135deg,#2f6fa8,#5aa9e6);color:#050505}

    .aviso-naovalidado{margin-top:.7rem;font-size:.78rem;font-weight:600;color:var(--red);background:rgba(229,57,53,.08);border:1px solid rgba(229,57,53,.3);border-radius:8px;padding:.6rem .8rem}

    .form-ocorrencia{margin-top:.9rem;display:flex;flex-direction:column;gap:.7rem}
    .form-ocorrencia label{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}
    .form-ocorrencia textarea, .form-ocorrencia input{width:100%;background:var(--surface3);border:1px solid var(--border-hi);border-radius:var(--radius);color:var(--text);font-size:.85rem;padding:.55rem .7rem;font-family:inherit}
    .form-ocorrencia textarea{min-height:70px;resize:vertical}
    .chip-group{display:flex;flex-wrap:wrap;gap:.4rem}
    .chip{padding:.4rem .75rem;border-radius:20px;border:1px solid var(--border-hi);background:var(--surface3);color:var(--text-dim);font-size:.72rem;font-weight:600;cursor:pointer}
    .chip.active{background:rgba(90,169,230,.15);border-color:var(--accent);color:var(--accent)}
    .causa-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
    @media(max-width:420px){.causa-grid{grid-template-columns:1fr}}
    .causa-item{padding:.5rem .7rem;background:var(--surface3);border:1px solid var(--border-hi);border-radius:var(--radius);font-size:.75rem;cursor:pointer;color:var(--text-dim)}
    .causa-item.active{background:rgba(90,169,230,.15);border-color:var(--accent);color:var(--accent)}

    .toggle-row{display:flex;gap:.5rem}
    .toggle-btn{flex:1;padding:.55rem;border-radius:var(--radius);border:1px solid var(--border-hi);background:var(--surface3);color:var(--text-dim);font-size:.8rem;font-weight:600;cursor:pointer;text-align:center}
    .toggle-btn.on-yes{background:rgba(139,195,74,.12);border-color:var(--green);color:var(--green)}
    .toggle-btn.on-no{background:rgba(229,57,53,.08);border-color:var(--red);color:var(--red)}
    .mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem;margin-top:.5rem}
    .mat-item{display:flex;flex-direction:column;background:var(--surface3);border:1px solid var(--border-hi);border-radius:var(--radius);padding:.5rem;align-items:center;gap:.3rem}
    .mat-item span{font-size:.62rem;font-weight:600;text-align:center;color:var(--text-dim);line-height:1.25}
    .mat-item input{width:100%;text-align:center;padding:.35rem;font-size:.85rem}
    .mat-extra-row{display:flex;gap:.4rem;margin-top:.5rem}
    .mat-extra-row input{flex:1}
    .mat-extra-row button{width:38px;background:var(--accent-dark);color:#fff;border:none;border-radius:var(--radius);font-size:1.1rem;cursor:pointer}

    .ceo-options{display:flex;flex-direction:column;gap:.4rem}
    .ceo-opt{padding:.55rem .75rem;background:var(--surface3);border:1px solid var(--border-hi);border-radius:var(--radius);font-size:.78rem;cursor:pointer;color:var(--text-dim)}
    .ceo-opt.active{background:rgba(90,169,230,.15);border-color:var(--accent);color:var(--accent);font-weight:600}

    .gps-block{background:var(--surface3);border:1px solid var(--border-hi);border-radius:var(--radius);padding:.6rem .7rem;margin-top:.3rem}
    .btn-gps{width:100%;padding:.55rem;background:rgba(90,169,230,.1);border:1px solid rgba(90,169,230,.3);border-radius:var(--radius);color:var(--accent);font-size:.78rem;font-weight:600;cursor:pointer}
    .gps-valor{font-size:.7rem;color:var(--text-dim);margin-top:.4rem;font-family:monospace;word-break:break-all}
    .link-manual{font-size:.68rem;color:var(--accent);cursor:pointer;text-decoration:underline;margin-top:.4rem;display:inline-block}

    .empty-msg{color:var(--text-muted);font-size:.85rem;text-align:center;padding:2rem 1rem}
    #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--accent-dark);border-radius:30px;padding:.6rem 1.2rem;font-size:.78rem;color:var(--accent);box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-overlay">
  <div class="login-box" id="boxLogin">
    <div class="login-heading">
      <h2 id="tituloEmpresa">NETTURBO</h2>
      <p>Minhas Atividades · Acesso do Técnico</p>
    </div>
    <div class="login-field">
      <label>Técnico</label>
      <select id="selTecnico"></select>
    </div>
    <div class="login-field">
      <label>PIN (fornecido pela liderança)</label>
      <input type="password" inputmode="numeric" maxlength="4" id="inputPin" placeholder="0000"/>
    </div>
    <div class="login-field">
      <label>Complemento (sua senha pessoal)</label>
      <input type="password" id="inputComplemento" placeholder="Sua senha"/>
    </div>
    <div class="login-info" id="infoLogin">Primeiro acesso: o complemento que você digitar agora vai virar sua senha pessoal daqui pra frente.</div>
    <div class="login-error" id="erroLogin"></div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="link-esqueci" onclick="mostrarReset()">Esqueci meu complemento</div>
  </div>

  <!-- TELA DE RESET (aparece no lugar do login) -->
  <div class="login-box" id="boxReset" style="display:none">
    <div class="login-heading">
      <h2>Redefinir Complemento</h2>
      <p>Informe seu PIN pra criar uma senha nova</p>
    </div>
    <div class="login-field">
      <label>Técnico</label>
      <select id="selTecnicoReset"></select>
    </div>
    <div class="login-field">
      <label>PIN (fornecido pela liderança)</label>
      <input type="password" inputmode="numeric" maxlength="4" id="inputPinReset" placeholder="0000"/>
    </div>
    <div class="login-field">
      <label>Novo Complemento</label>
      <input type="password" id="inputNovoComplemento" placeholder="Nova senha pessoal"/>
    </div>
    <div class="login-error" id="erroReset"></div>
    <button class="login-btn" onclick="fazerReset()">Salvar Nova Senha</button>
    <div class="link-esqueci" onclick="mostrarLogin()">Voltar ao login</div>
  </div>
</div>

<!-- APP -->
<header id="headerApp" style="display:none">
  <div class="header-inner">
    <div>
      <div class="hdr-brand">Netturbo</div>
      <div class="hdr-sub">Minhas Atividades</div>
    </div>
    <div style="flex:1"></div>
    <button onclick="carregarAtividades()" style="background:var(--surface3);border:1px solid var(--border-hi);color:var(--text-dim);font-family:'Rajdhani',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.5rem .9rem;border-radius:8px;cursor:pointer">↻ Atualizar</button>
  </div>
</header>

<main id="app" style="display:none">
  <div id="listaAtividades"></div>
</main>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIGURAÇÃO — pra duplicar pra outra empresa, troca só a linha abaixo
// e o texto "NETTURBO" nos dois <h2> de login acima.
// ══════════════════════════════════════════════════════════════
const EMPRESA_ATUAL = "NETTURBO";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjRSTNLtZs4rUlacLcm_A_lygHYhKbFzPjs02-NCD6f00CVn7zeEDVe96poT7BYtlsVQ/exec";

const TECH_MAP = {
  "NETTURBO": ["Leonardo da Cruz Egidio","Weslley Rodrigues Pinto","Reginaldo Venâncio da Silva","Nicolas Lima de Almeida","Warley Aparecido de Paula","Marco Rodrigo dos Santos","Micael Oliveira dos Santos","Tiago Soares da Silva Calado"],
  "OLIVEIRA": ["Evaneis Silva Oliveira"],
  "PV": ["Petterson Valentim Barreto"],
  "QUALITY": ["Jurandy Luis da Silva Filho","Guilherme dos Santos Reis","Wesley Henrique da Silva Rios"],
  "SOLUTEC": ["Lielder Rogers Miranda","Marcio Aparecido Santiago"],
  "VAL": ["Guilherme de Jesus Arruda","Djalma Aparecido Inocêncio","Marcos Mendes Merino","Altimayer de Araújo Lima","Robson Rodrigues Santos","Felipe Martins Santos Silva","Jonathan Henrique Honorato","Diego Eduardo de Souza Basso"]
};

let TECNICO_LOGADO = '';

function popularTecnicos(){
  const nomes = TECH_MAP[EMPRESA_ATUAL] || [];
  const opts = '<option value="">Selecione...</option>' + nomes.map(n=>`<option value="${n}">${n}</option>`).join('');
  document.getElementById('selTecnico').innerHTML = opts;
  document.getElementById('selTecnicoReset').innerHTML = opts;
}
popularTecnicos();

function mostrarReset(){
  document.getElementById('boxLogin').style.display = 'none';
  document.getElementById('boxReset').style.display = 'flex';
}
function mostrarLogin(){
  document.getElementById('boxReset').style.display = 'none';
  document.getElementById('boxLogin').style.display = 'flex';
}
window.mostrarReset = mostrarReset;
window.mostrarLogin = mostrarLogin;

async function fazerLogin(){
  const tecnico = document.getElementById('selTecnico').value;
  const pin = document.getElementById('inputPin').value.trim();
  const complemento = document.getElementById('inputComplemento').value;
  const erroEl = document.getElementById('erroLogin');
  erroEl.classList.remove('visible');

  if(!tecnico || !pin || !complemento){ mostrarErroLogin('Preencha técnico, PIN e complemento.'); return; }

  try{
    const resp = await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ acao:'LOGIN_TECNICO', empresa:EMPRESA_ATUAL, tecnico, pin, complemento })
    });
    const result = await resp.json();
    if(result.status !== 'ok'){ mostrarErroLogin(result.message || 'Não foi possível entrar.'); return; }

    TECNICO_LOGADO = tecnico;
    sessionStorage.setItem('esteira_tecnico_logado', tecnico);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('headerApp').style.display = 'block';
    document.getElementById('app').style.display = 'block';
    if(result.primeiroAcesso){ showToast('✅ Senha pessoal criada com sucesso!'); }
    carregarAtividades();
    // Sem atualização automática aqui de propósito — o técnico costuma resolver
    // uma atividade de cada vez, e recarregar sozinho apagaria o formulário
    // que ele está preenchendo. Use o botão "↻ Atualizar" no topo pra ver
    // atividade nova sem perder o que estiver preenchendo.
  }catch(err){
    console.error(err);
    mostrarErroLogin('Erro ao conectar com o servidor.');
  }
}
window.fazerLogin = fazerLogin;

// Se o técnico já tinha entrado nesta sessão do navegador (mesma aba/sessão),
// não pede PIN/complemento de novo, mesmo se a página for recarregada (F5).
(function tentarSessaoExistente(){
  const salvo = sessionStorage.getItem('esteira_tecnico_logado');
  if(salvo){
    TECNICO_LOGADO = salvo;
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('headerApp').style.display = 'block';
    document.getElementById('app').style.display = 'block';
    carregarAtividades();
  }
})();

function mostrarErroLogin(msg){
  const el = document.getElementById('erroLogin');
  el.textContent = '❌ ' + msg;
  el.classList.add('visible');
}

async function fazerReset(){
  const tecnico = document.getElementById('selTecnicoReset').value;
  const pin = document.getElementById('inputPinReset').value.trim();
  const novoComplemento = document.getElementById('inputNovoComplemento').value;
  const erroEl = document.getElementById('erroReset');
  erroEl.classList.remove('visible');

  if(!tecnico || !pin || !novoComplemento){
    erroEl.textContent = '❌ Preencha técnico, PIN e a nova senha.';
    erroEl.classList.add('visible');
    return;
  }

  try{
    const resp = await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ acao:'RESET_COMPLEMENTO', empresa:EMPRESA_ATUAL, tecnico, pin, novoComplemento })
    });
    const result = await resp.json();
    if(result.status !== 'ok'){
      erroEl.textContent = '❌ ' + (result.message || 'Não foi possível redefinir.');
      erroEl.classList.add('visible');
      return;
    }
    showToast('✅ Senha redefinida! Faça login com a senha nova.');
    mostrarLogin();
  }catch(err){
    console.error(err);
    erroEl.textContent = '❌ Erro ao conectar com o servidor.';
    erroEl.classList.add('visible');
  }
}
window.fazerReset = fazerReset;

// ── ATIVIDADES ───────────────────────────────────────────────
async function carregarAtividades(){
  try{
    const url = APPS_SCRIPT_URL + '?acao=LISTAR_ATIVIDADES_TECNICO&empresa=' + encodeURIComponent(EMPRESA_ATUAL) + '&tecnico=' + encodeURIComponent(TECNICO_LOGADO);
    const resp = await fetch(url);
    const result = await resp.json();
    renderAtividades(result.atividades || []);
  }catch(err){
    console.error(err);
  }
}

const CONFIG_CAUSAS = {
  'ROMPIMENTO':['Rompimento Troca de Poste','Rompimento Carga Alta','Rompimento Vandalismo','Rompimento Acidente em Via','Rompimento Queimadas','Rompimento Parcial','Rompimento Descarga Elétrica','Rompimento Poda Árvore','Rompimento Subterrâneo','Degradação Rede Externa','Degradação Rede Externa (Atenuação)','Visita Cliente (Rompimento Interno)','Improdutiva Chamado Improcedente','Improdutiva Cliente','Improdutiva Clima / Fator Externo','Improdutiva Comercial','Improdutiva Delivery','Improdutiva Documentação (APR/NR)','Improdutiva Documentação (ART/DWG)','Improdutiva Infraestrutura (Rede)','Improdutiva Last Mile','Improdutiva Logística','Improdutiva NOC','Improdutiva OEM','Improdutiva Terceiro (DER/Cia Elétrica)','Improdutiva Validação','🐛 Insetos'],
  'MASSIVA':['Rompimento Troca de Poste','Rompimento Carga Alta','Rompimento Vandalismo','Rompimento Acidente em Via','Rompimento Queimadas','Rompimento Parcial','Rompimento Descarga Elétrica','Rompimento Poda Árvore','Rompimento Subterrâneo','Degradação Rede Externa','Degradação Rede Externa (Atenuação)','Visita Cliente (Rompimento Interno)','Improdutiva Chamado Improcedente','Improdutiva Cliente','Improdutiva Clima / Fator Externo','Improdutiva Comercial','Improdutiva Delivery','Improdutiva Documentação (APR/NR)','Improdutiva Documentação (ART/DWG)','Improdutiva Infraestrutura (Rede)','Improdutiva Last Mile','Improdutiva Logística','Improdutiva NOC','Improdutiva OEM','Improdutiva Terceiro (DER/Cia Elétrica)','Improdutiva Validação','🐛 Insetos'],
  'ACOMPANHAMENTO CPFL':[], 'PREVENTIVA':[], 'AGENDAMENTO':['SEM ACESSO','GTD','TRANSMISSÃO']
};

let ATIVIDADES_CACHE = [];

function renderAtividades(atividades){
  ATIVIDADES_CACHE = atividades;
  const el = document.getElementById('listaAtividades');
  if(!atividades.length){
    el.innerHTML = '<div class="empty-msg">Nenhuma atividade despachada pra você no momento.</div>';
    return;
  }

  el.innerHTML = atividades.map(a=>{
    const status = a['Status'];
    let statusLabel = '', statusClass = '', corpo = '';

    if(status === 'DESPACHADA'){
      statusLabel = 'Aguardando início'; statusClass = 'st-despachada';
      corpo = `<button class="btn-acao btn-iniciar" onclick="marcarAcao(${a.rowIndex})">▶ Iniciar Atividade</button>`;
    } else if(status === 'INICIADA'){
      statusLabel = 'Em deslocamento (início: '+ (a['Hora Início']||'—') +')'; statusClass = 'st-iniciada';
      corpo = `<button class="btn-acao btn-chegada" onclick="marcarAcao(${a.rowIndex})">📍 Cheguei no Local</button>`;
    } else if(status === 'EM_CAMPO' || status === 'NAO_VALIDADA'){
      statusLabel = status === 'NAO_VALIDADA' ? 'Devolvido — precisa de ajuste' : ('Em campo (chegada: ' + (a['Hora Chegada']||'—') + ')');
      statusClass = status === 'NAO_VALIDADA' ? 'st-iniciada' : 'st-em-campo';
      const avisoMotivo = status === 'NAO_VALIDADA' ? `<div class="aviso-naovalidado">⚠️ NOC não validou: ${a['Motivo Não Validado']||'sem motivo informado'}</div>` : '';
      corpo = avisoMotivo + renderFormOcorrencia(a);
    } else if(status === 'AGUARDANDO_VALIDACAO'){
      statusLabel = 'Aguardando validação do NOC'; statusClass = 'st-iniciada';
      corpo = `<button class="btn-acao btn-concluido" disabled>Aguardando a liderança validar com o NOC...</button>`;
    } else if(status === 'VALIDADA'){
      statusLabel = 'Concluída e validada ✅'; statusClass = 'st-em-campo';
      corpo = '';
    } else {
      statusLabel = status; statusClass = 'st-despachada';
    }

    return `<div class="atv-card">
      <div class="atv-protocolo">${a['Protocolo O&M'] || a['Protocolo NOC'] || '—'}</div>
      <div class="atv-cliente">${a['Cliente']||'—'}</div>
      <div class="atv-meta">${a['Motivo']||''}<br>${a['Endereço']||''}<br>${a['Data NOC']||''} ${a['Período']?'· '+a['Período']:''}</div>
      <span class="atv-status ${statusClass}">${statusLabel}</span>
      ${corpo}
    </div>`;
  }).join('');

  // Inicializa a lista de causas de cada formulário aberto (não dá pra rodar script via innerHTML)
  atividades.forEach(a=>{
    if(a['Status'] === 'EM_CAMPO' || a['Status'] === 'NAO_VALIDADA'){
      renderCausasTecnico(a.rowIndex, a['Causa'] || '');
    }
  });
}

function renderFormOcorrencia(a){
  const tipoAtual = a['Ocorrência'] || '';
  const ceoAtual = a['CEO'] || '';
  const tipos = ['ROMPIMENTO','MASSIVA','ACOMPANHAMENTO CPFL','PREVENTIVA','AGENDAMENTO'];
  const isFibra = (tipoAtual === 'ROMPIMENTO' || tipoAtual === 'MASSIVA');
  return `
    <div class="form-ocorrencia" id="form-${a.rowIndex}">
      <div>
        <label>Tipo de Ocorrência</label>
        <div class="chip-group" id="chips-${a.rowIndex}">
          ${tipos.map(t=>`<div class="chip${t===tipoAtual?' active':''}" data-tipo="${t}" onclick="selecionarTipo(${a.rowIndex},'${t}')">${t}</div>`).join('')}
        </div>
      </div>
      <div>
        <label>Causa Principal</label>
        <div id="causas-${a.rowIndex}"></div>
      </div>
      <div id="local-falha-${a.rowIndex}" style="display:${isFibra?'block':'none'}">
        <label>Local da Falha</label>
        ${gpsWidget(a.rowIndex,'falha', a['GPS Falha']||'')}
      </div>
      <div id="ceo-block-${a.rowIndex}" style="display:${isFibra?'block':'none'}">
        <label>Tipo de CEO Utilizado</label>
        <div class="ceo-options" id="ceo-opts-${a.rowIndex}">
          <div class="ceo-opt${ceoAtual==='nova'?' active':''}" data-ceo="nova" onclick="selecionarCEO(${a.rowIndex},'nova')">Caixa Nova → Nova (2 novas)</div>
          <div class="ceo-opt${ceoAtual==='existente'?' active':''}" data-ceo="existente" onclick="selecionarCEO(${a.rowIndex},'existente')">Caixa Nova → Existente</div>
          <div class="ceo-opt${ceoAtual==='existente-existente'?' active':''}" data-ceo="existente-existente" onclick="selecionarCEO(${a.rowIndex},'existente-existente')">Caixa Existente → Existente</div>
        </div>
      </div>
      <div id="local-ceo-extra-${a.rowIndex}" style="display:${ceoAtual==='nova'?'block':'none'}">
        <div><label>Localização Caixa Nova A</label>${gpsWidget(a.rowIndex,'ceoA', a['GPS Caixa Nova A']||'')}</div>
        <div style="margin-top:.5rem"><label>Localização Caixa Nova B</label>${gpsWidget(a.rowIndex,'ceoB', a['GPS Caixa Nova B']||'')}</div>
      </div>
      <div>
        <label>Houve uso de material?</label>
        <div class="toggle-row">
          <button type="button" class="toggle-btn" id="mat-sim-${a.rowIndex}" onclick="setMaterialTecnico(${a.rowIndex}, true)">✅ Sim</button>
          <button type="button" class="toggle-btn" id="mat-nao-${a.rowIndex}" onclick="setMaterialTecnico(${a.rowIndex}, false)">❌ Não</button>
        </div>
        <div id="listamat-${a.rowIndex}"></div>
      </div>
      <div>
        <label>Solução Realizada</label>
        <textarea id="solucao-${a.rowIndex}" placeholder="O que foi feito para resolver...">${a['Solução']||''}</textarea>
      </div>
      <div>
        <label>Melhoria de Rede</label>
        <textarea id="melhoria-${a.rowIndex}" placeholder="O que foi feito para melhorar a rede...">${a['Melhoria']||''}</textarea>
      </div>
      <button class="btn-acao btn-validar" onclick="solicitarValidacao(${a.rowIndex})">✅ Solicitar Validação NOC</button>
    </div>
  `;
}

function gpsWidget(rowIndex, key, valorSalvo){
  return `
    <div class="gps-block">
      <button type="button" class="btn-gps" onclick="capturarGPS(${rowIndex},'${key}')">📍 Capturar GPS</button>
      <div class="gps-valor" id="gpsval-${rowIndex}-${key}">${valorSalvo||''}</div>
      <div class="link-manual" onclick="alternarManual(${rowIndex},'${key}')">Sem sinal de GPS? Digitar endereço manualmente</div>
      <input type="text" id="gpsmanual-${rowIndex}-${key}" placeholder="Endereço manual..." style="display:none;margin-top:.4rem"/>
    </div>`;
}

// ── MATERIAIS (mesma lista fixa do RFO Técnico) ─────────────────
const MAT_FIBRA = ['CABO 12F','CABO 4F','CABO 24F','CABO 72F','ALÇA VERMELHA','MINI FISC','PLAQUETA NTT','FIO DE ESPINAR','FISC 48FO','EMENDA DROP 12F (PASTEL)'];
let MATERIAIS_STATE = {}; // rowIndex -> { usaMat: true/false/null, itens: [{n,q,livre}] }

window.setMaterialTecnico = function(rowIndex, sim){
  document.getElementById('mat-sim-'+rowIndex).classList.toggle('on-yes', sim);
  document.getElementById('mat-nao-'+rowIndex).classList.toggle('on-no', !sim);
  if(!MATERIAIS_STATE[rowIndex] || MATERIAIS_STATE[rowIndex].usaMat !== sim){
    MATERIAIS_STATE[rowIndex] = { usaMat: sim, itens: sim ? MAT_FIBRA.map(m=>({n:m,q:'',livre:false})) : [] };
  }
  renderListaMateriais(rowIndex);
};

function renderListaMateriais(rowIndex){
  const cont = document.getElementById('listamat-'+rowIndex);
  const estado = MATERIAIS_STATE[rowIndex];
  if(!cont || !estado || !estado.usaMat){ if(cont) cont.innerHTML=''; return; }

  cont.innerHTML = `<div class="mat-grid">${estado.itens.map((m,idx)=>
    m.livre
      ? `<div class="mat-item"><input type="text" placeholder="Material" value="${m.n}" oninput="atualizarMatLivre(${rowIndex},${idx},this.value)"/><input type="number" placeholder="Qtd" min="0" value="${m.q}" oninput="atualizarMatQtd(${rowIndex},${idx},this.value)"/></div>`
      : `<div class="mat-item"><span>${m.n}</span><input type="number" placeholder="0" min="0" value="${m.q}" oninput="atualizarMatQtd(${rowIndex},${idx},this.value)"/></div>`
  ).join('')}</div>
  <div class="mat-extra-row">
    <input type="text" id="matextra-n-${rowIndex}" placeholder="Outro material..."/>
    <input type="number" id="matextra-q-${rowIndex}" placeholder="Qtd" min="0" style="max-width:70px"/>
    <button type="button" onclick="adicionarMatExtra(${rowIndex})">+</button>
  </div>`;
}

window.atualizarMatQtd = function(rowIndex, idx, val){ MATERIAIS_STATE[rowIndex].itens[idx].q = val; };
window.atualizarMatLivre = function(rowIndex, idx, val){ MATERIAIS_STATE[rowIndex].itens[idx].n = val; };
window.adicionarMatExtra = function(rowIndex){
  const nome = document.getElementById('matextra-n-'+rowIndex).value.trim();
  const qtd = document.getElementById('matextra-q-'+rowIndex).value;
  if(!nome){ showToast('⚠️ Informe o nome do material.'); return; }
  MATERIAIS_STATE[rowIndex].itens.push({ n:nome, q:qtd||'1', livre:true });
  renderListaMateriais(rowIndex);
};

function montarStringMateriais(rowIndex){
  const estado = MATERIAIS_STATE[rowIndex];
  if(!estado || estado.usaMat !== true) return 'Não houve';
  const lista = estado.itens.filter(m=>m.n && Number(m.q)>0).map(m=>m.n+': '+m.q);
  return lista.length ? lista.join(' · ') : 'Nenhum item informado';
}

window.selecionarTipo = function(rowIndex, tipo){
  document.querySelectorAll(`#chips-${rowIndex} .chip`).forEach(c=>c.classList.toggle('active', c.dataset.tipo===tipo));
  renderCausasTecnico(rowIndex, '');

  const isFibra = (tipo === 'ROMPIMENTO' || tipo === 'MASSIVA');
  const falhaBlock = document.getElementById('local-falha-'+rowIndex);
  const ceoBlock = document.getElementById('ceo-block-'+rowIndex);
  const ceoExtra = document.getElementById('local-ceo-extra-'+rowIndex);
  if(falhaBlock) falhaBlock.style.display = isFibra ? 'block' : 'none';
  if(ceoBlock) ceoBlock.style.display = isFibra ? 'block' : 'none';
  if(!isFibra){
    CEO_STATE[rowIndex] = null;
    if(ceoExtra) ceoExtra.style.display = 'none';
  }
};

window.selecionarCEO = function(rowIndex, ceo){
  document.querySelectorAll(`#ceo-opts-${rowIndex} .ceo-opt`).forEach(el=>el.classList.toggle('active', el.dataset.ceo===ceo));
  CEO_STATE[rowIndex] = ceo;
  const extra = document.getElementById('local-ceo-extra-'+rowIndex);
  if(extra) extra.style.display = (ceo === 'nova') ? 'block' : 'none';
};

window.capturarGPS = function(rowIndex, key){
  const val = document.getElementById('gpsval-'+rowIndex+'-'+key);
  if(!val) return;
  val.textContent = 'Buscando sinal...';
  if(!navigator.geolocation){ val.textContent = 'GPS não suportado neste aparelho.'; return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude.toFixed(6), lon = pos.coords.longitude.toFixed(6);
    const link = 'https://maps.google.com/?q='+lat+','+lon;
    GPS_STATE[rowIndex+'-'+key] = link;
    val.textContent = '📍 ' + lat + ', ' + lon;
  }, ()=>{
    val.textContent = 'Não foi possível capturar sinal — use o campo manual abaixo.';
  }, { enableHighAccuracy:true, timeout:10000 });
};

window.alternarManual = function(rowIndex, key){
  const inp = document.getElementById('gpsmanual-'+rowIndex+'-'+key);
  if(inp) inp.style.display = (inp.style.display === 'none') ? 'block' : 'none';
};

function pegarGPS(rowIndex, key){
  const manual = document.getElementById('gpsmanual-'+rowIndex+'-'+key);
  if(manual && manual.value.trim()) return manual.value.trim();
  return GPS_STATE[rowIndex+'-'+key] || '';
}

let CEO_STATE = {};
let GPS_STATE = {};

window.renderCausasTecnico = function(rowIndex, causaAtual){
  const chipAtivo = document.querySelector(`#chips-${rowIndex} .chip.active`);
  const tipo = chipAtivo ? chipAtivo.dataset.tipo : '';
  const cont = document.getElementById('causas-'+rowIndex);
  if(!cont) return;

  if(tipo === 'ACOMPANHAMENTO CPFL'){
    cont.innerHTML = `<input type="text" id="causaLivre-${rowIndex}" placeholder="Nº da Notificação CPFL..." value="${causaAtual}"/>`;
    return;
  }
  if(tipo === 'PREVENTIVA'){
    cont.innerHTML = `<input type="text" id="causaLivre-${rowIndex}" placeholder="Descreva a causa..." value="${causaAtual}"/>`;
    return;
  }
  const lista = CONFIG_CAUSAS[tipo] || [];
  if(!lista.length){
    cont.innerHTML = '<div style="font-size:.72rem;color:var(--text-muted);font-style:italic">Selecione o tipo de ocorrência...</div>';
    return;
  }
  cont.innerHTML = `<div class="causa-grid">${lista.map(c=>`<div class="causa-item${c===causaAtual?' active':''}" data-causa="${c}" onclick="selecionarCausa(${rowIndex},'${c.replace(/'/g,"\\'")}')">${c}</div>`).join('')}</div>`;
};

window.selecionarCausa = function(rowIndex, causa){
  document.querySelectorAll(`#causas-${rowIndex} .causa-item`).forEach(c=>c.classList.toggle('active', c.dataset.causa===causa));
};

function pegarCausaAtual(rowIndex){
  const livre = document.getElementById('causaLivre-'+rowIndex);
  if(livre) return livre.value.trim();
  const ativo = document.querySelector(`#causas-${rowIndex} .causa-item.active`);
  return ativo ? ativo.dataset.causa : '';
}

window.solicitarValidacao = async function(rowIndex){
  const chipAtivo = document.querySelector(`#chips-${rowIndex} .chip.active`);
  const tipo = chipAtivo ? chipAtivo.dataset.tipo : '';
  const causa = pegarCausaAtual(rowIndex);
  const solucao = document.getElementById('solucao-'+rowIndex).value.trim();
  const melhoria = document.getElementById('melhoria-'+rowIndex).value.trim();
  const estadoMat = MATERIAIS_STATE[rowIndex];

  if(!tipo){ showToast('⚠️ Selecione o tipo de ocorrência.'); return; }
  // Causa é obrigatória, exceto pra ACOMPANHAMENTO CPFL e PREVENTIVA (mesma regra do RFO Técnico original)
  if(tipo !== 'ACOMPANHAMENTO CPFL' && tipo !== 'PREVENTIVA' && !causa){
    showToast('⚠️ Selecione a Causa Principal.'); return;
  }
  if(!estadoMat || estadoMat.usaMat === null || estadoMat.usaMat === undefined){ showToast('⚠️ Informe se houve uso de material.'); return; }
  if(!solucao){ showToast('⚠️ Preencha a Solução Realizada.'); return; }
  if(!melhoria){ showToast('⚠️ Preencha a Melhoria de Rede.'); return; }

  const isFibra = (tipo === 'ROMPIMENTO' || tipo === 'MASSIVA');
  let ceo = '';
  if(isFibra){
    ceo = CEO_STATE[rowIndex];
    if(!ceo){ showToast('⚠️ Selecione o Tipo de CEO Utilizado.'); return; }
  }
  const gpsFalha = isFibra ? pegarGPS(rowIndex,'falha') : '';
  const gpsCeoA = (ceo === 'nova') ? pegarGPS(rowIndex,'ceoA') : '';
  const gpsCeoB = (ceo === 'nova') ? pegarGPS(rowIndex,'ceoB') : '';

  const materiais = montarStringMateriais(rowIndex);

  try{
    const resp = await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ acao:'SALVAR_OCORRENCIA', rowIndex, ocorrencia:tipo, causa, solucao, materiais, melhoria, ceo, gpsFalha, gpsCeoA, gpsCeoB })
    });
    const result = await resp.json();
    if(result.status !== 'ok'){ showToast('❌ ' + (result.message||'Erro ao salvar.')); return; }
    showToast('✅ Enviado para validação do NOC!');
    carregarAtividades();
  }catch(err){
    console.error(err);
    showToast('❌ Erro ao conectar com o servidor.');
  }
};

window.marcarAcao = async function(rowIndex){
  try{
    const resp = await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({ acao:'MARCAR_INICIO_CHEGADA', rowIndex })
    });
    const result = await resp.json();
    if(result.status !== 'ok'){ showToast('❌ ' + (result.message||'Erro ao registrar.')); return; }
    showToast(result.etapa === 'inicio' ? '✅ Início registrado: ' + result.hora : '✅ Chegada registrada: ' + result.hora);
    carregarAtividades();
  }catch(err){
    console.error(err);
    showToast('❌ Erro ao conectar com o servidor.');
  }
};

// ── TOAST ──────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}
</script>
</body>
</html>
